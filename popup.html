<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/src/popup.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <h1 id="title">締切カウントダウン</h1>
            <p id="onboarding-guide" class="onboarding-guide is-hidden">締切名と締切日を入力して「追加」を押すと、一覧とバッジに残り日数が表示されます。</p>
        </header>

        <form id="input-form" class="deadline-form">
            <label id="deadline-name-label" for="deadline-name" class="field-label">締切名</label>
            <input type="text" id="deadline-name" placeholder="例: レポート提出" autocomplete="off" aria-required="true">
            <label id="deadline-date-label" for="deadline-date" class="field-label">締切日</label>
            <input type="date" id="deadline-date" aria-required="true">
            <label id="deadline-repeat-label" for="deadline-repeat" class="field-label is-hidden">繰り返し</label>
            <select id="deadline-repeat" class="is-hidden">
                <option value="none" id="repeat-none">繰り返しなし</option>
                <option value="weekly" id="repeat-weekly">毎週</option>
                <option value="monthly" id="repeat-monthly">毎月</option>
                <option value="yearly" id="repeat-yearly">毎年</option>
            </select>
            <button id="add-btn" class="primary-button" type="submit" aria-controls="deadline-list">追加</button>
        </form>

        <section class="deadline-list" aria-labelledby="deadline-list-title">
            <h2 id="deadline-list-title" class="section-title">締切一覧</h2>
            <div id="deadline-list" class="deadline-items" aria-live="polite" aria-atomic="false" tabindex="-1">
                <div class="state-message" role="status">読み込み中...</div>
            </div>
        </section>

        <section id="premium-info" class="premium-info" aria-labelledby="premium-info-title">
            <h2 id="premium-info-title" class="sr-only">Premiumの状態</h2>
            <span id="trial-status" role="status" aria-live="polite" aria-atomic="true"></span>
            <button id="upgrade-btn" class="secondary-button is-hidden" type="button">Premiumにアップグレード</button>
        </section>
    </main>
    <script type="module" src="/src/popup.ts"></script>
</body>
</html>
