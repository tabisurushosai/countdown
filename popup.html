<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/src/popup.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <h1 id="title">締切カウントダウン</h1>
        </header>

        <section id="input-form" class="deadline-form">
            <input type="text" id="deadline-name" placeholder="名前">
            <input type="date" id="deadline-date">
            <select id="deadline-repeat" class="is-hidden">
                <option value="none" id="repeat-none">None</option>
                <option value="weekly" id="repeat-weekly">Weekly</option>
                <option value="monthly" id="repeat-monthly">Monthly</option>
                <option value="yearly" id="repeat-yearly">Yearly</option>
            </select>
            <button id="add-btn" class="primary-button">追加</button>
        </section>

        <section id="deadline-list" class="deadline-list" aria-live="polite">
            <div class="state-message">読み込み中...</div>
        </section>

        <section id="premium-info" class="premium-info">
            <span id="trial-status"></span>
            <button id="upgrade-btn" class="secondary-button is-hidden">Upgrade to Premium</button>
        </section>
    </main>
    <script type="module" src="/src/popup.ts"></script>
</body>
</html>
